<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amazon</title>
    <!-- Fontawesome CSS -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <!-- Navbar -->
      <div class="navbar">
        <!-- First box -->
        <div class="nav-logo border">
          <div class="logo"></div>
        </div>
        <!-- Second box -->
        <div class="address-location border">
          <div class="location-1">
            <p>Deliver to</p>
          </div>
          <div class="location-2">
            <i class="fa-solid fa-location-dot"></i>
            <p id="paragraph">Bangladesh</p>
          </div>
        </div>
        <!-- Third Box -->
        <div class="search">
          <select class="select-search">
            <option value="all">All</option>
          </select>
          <input class="input-search" type="text" placeholder="Search Amazon" />
          <div class="icon-search">
            <i class="fa-solid fa-magnifying-glass"></i>
          </div>
        </div>
        <!-- Fourth Box -->
        <div class="language border">
          <div class="us-flag"></div>
          <select class="option">
            <option value="English">EN</option>
          </select>
        </div>
        <!-- Fifth Box -->
        <div class="sign border">
          <div class="paragraph-1"><p>Hello, sign in</p></div>
          <div class="section-1">
            <select>
              <option>Account & Lists</option>
            </select>
          </div>
        </div>
        <!-- sixth Box -->
        <div class="paragraph-2 border">
          <p>
            Returns <br />
            <span id="wow-1">& Orders</span>
          </p>
        </div>
        <!-- Seventh Box -->
        <div class="shopping-cart border">
          <div class="cart-imag"></div>
          <div class="paragraph-3"><p>Cart</p></div>
        </div>
        <!-- panel line -->
      </div>
      <div class="nev-panel">
        <div class="panel-1 border">
          <a href="#"><i class="fa-solid fa-bars"></i></a>
          <a href="#">All</a>
        </div>
        <div class="panel-2">
          <a class="panel-3 border wow-5" href="#">Today's Deals</a>
          <a class="panel-3 border" href="#">Registry</a>
          <a class="panel-3 border" href="#">Prime Video</a>
          <a class="panel-3 border" href="#">Prime Video</a>
          <a class="panel-3 border" href="#">Gift Cards</a>
          <a class="panel-3 border" href="#">Customer Service</a>
          <a class="panel-3 border" href="#">Sell</a>
        </div>
      </div>
    </header>
  </body>
</html>
