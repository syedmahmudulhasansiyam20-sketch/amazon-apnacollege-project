<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon</title>
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.8/css/bootstrap.min.css" integrity="sha512-2bBQCjcnw658Lho4nlXJcc6WkV/UxpE/sAokbXPxQNGqmNdQrWqtw26Ns9kFF/yG792pKR1Sx8/Y1Lf1XN4GKA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
     <!-- Fontawesome CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
      <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <!-- Navbar -->
        <div class="navbar">
            <!-- First box -->
            <div class="nav-logo border">
                <div class="logo"></div>
            </div>
            <!-- Second box -->
             <div class="address-location border">
                <div class="location-1">
                    <p>Deliver to</p>
                </div>
                <div class="location-2">
                    <i class="fa-solid fa-location-dot"></i>
                    <p id="paragraph">Bangladesh</p>
                </div>
             </div>
             <!-- Third Box -->
              <div class="search">
                <select class="select-search">
                    <option value="all">All</option>
                </select>
                <input class="input-search" type="text" placeholder="Search Amazon">
                <div class="icon-search"><i class="fa-solid fa-magnifying-glass"></i></div>
              </div>
              <!-- Fourth Box -->
               <div class="language border">
                <div class="us-flag">
                </div>
                <select class="option">
                    <option value="Enlish">EN</option>
                </select>
               </div>
               <!-- Fifth Box -->
                <div class="sign border">
                    <div class="paragraph-1"><p>Hello, sign in</p></div>
                    <div class="section-1"><select>
                        <option>Account & Lists</option>
                    </select></div>
                </div>
                <!-- sixth Box -->
                 <div class="paragraph-2 border"><p>Returns <br> <span id="wow-1">& Orders</span></p></div>
                 <!-- Seventh Box -->
                  <div class="shopping-cart border">
                    <div class="cart-imag"></div>
                    <div class="paragraph-3"><p>Cart</p></div>
                  </div>
                  <!-- panel line -->
        </div>
        <div class="nev-panel">
            <div class="panel-1 border">
            <a href="#"><i class="fa-solid fa-bars"></i></a>
            <a href="#">All</a>
            </div>
            <div class="panel-2 ">
                <a class="panel-3 border wow-5" href="#">Today's Deals</a>
                <a class="panel-3 border" href="#">Registry</a>
                <a class="panel-3 border" href="#">Prime Video</a>
                <a class="panel-3 border" href="#">Prime Video</a>
                <a class="panel-3 border" href="#">Gift Cards</a>
                <a class="panel-3 border" href="#">Customer Service</a>
                <a class="panel-3 border" href="#">Sell</a>
            </div>
        </div>
    </header>
    <!-- Carousel -->
          <div id="carouselExampleIndicators" class="carousel slide">
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="1" aria-label="Slide 2"></button>
    <button type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide-to="2" aria-label="Slide 3"></button>
  </div>
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="61Yx5-N155L._SX3000_.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="71qcoYgEhzL._SX3000_.jpg" class="d-block w-100" alt="...">
    </div>
    <div class="carousel-item">
      <img src="81mLoEvjbEL._SX3000_.jpg" class="d-block w-100" alt="...">
    </div>
  </div>
  <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="prev">
    <span class="carousel-control-prev-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Previous</span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleIndicators" data-bs-slide="next">
    <span class="carousel-control-next-icon" aria-hidden="true"></span>
    <span class="visually-hidden">Next</span>
  </button>
</div>


<!-- Bootstrap Bundle -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/5.3.8/js/bootstrap.bundle.min.js" integrity="sha512-HvOjJrdwNpDbkGJIG2ZNqDlVqMo77qbs4Me4cah0HoDrfhrbA+8SBlZn1KrvAQw7cILLPFJvdwIgphzQmMm+Pw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
</body>
</html>
